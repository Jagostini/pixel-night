name: "🐛 Bug report"
description: Signaler un comportement inattendu ou une erreur
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug. Plus votre rapport est précis, plus il sera facile à corriger.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Décrivez clairement et précisément ce qui se passe.
      placeholder: "Quand je fais X, il se passe Y au lieu de Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Liste des étapes permettant de reproduire le problème.
      placeholder: |
        1. Ouvrir la page `/s/{slug}`
        2. Cliquer sur "..."
        3. Observer l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Décrivez ce qui devrait se passer normalement.
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Phase de la soirée concernée
      options:
        - planned
        - theme_vote
        - film_proposal
        - film_vote
        - completed
        - cancelled
        - "Non applicable / Inconnu"
    validations:
      required: false

  - type: dropdown
    id: audience
    attributes:
      label: Rôle concerné
      options:
        - Participant
        - Organisateur
        - Les deux
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte technique
      description: Navigateur, système d'exploitation, version de l'app si connue.
      placeholder: "Chrome 123 / macOS 14 / pixel-night v1.2.0"

  - type: textarea
    id: logs
    attributes:
      label: Logs / captures d'écran
      description: Collez ici tout message d'erreur ou capture pertinente.
      render: shell
