name: Post-Release Smoke Test

# Triggered by release-please after it creates a GitHub Release and tag.
# Use this workflow for any post-release tasks (notifications, smoke tests, etc.)

on:
  release:
    types: [published]

jobs:
  smoke-test:
    name: Verify build on release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Type check
        run: pnpm tsc --noEmit
